<!DOCTYPE html>
<html>
<head>
  <title>Axum Power</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #020617;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      padding: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 15px;
      background: #22c55e;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 16px;
    }

    .secondary {
      background: #3b82f6;
    }
  </style>
</head>

<body>

<header>
  Axum Power
</header>

<div class="container">

  <div class="card">
    <h2>Welcome</h2>
    <p>Secure investment platform powered for global users.</p>
  </div>

  <div class="card">
    <h2>Deposit Funds</h2>
    <p>Select your preferred method</p>

    <button onclick="alert('Crypto deposit coming next')">
      Deposit with Crypto
    </button>

    <br><br>

    <button class="secondary" onclick="alert('M-Pesa option coming next')">
      Deposit with M-Pesa
    </button>
  </div>

  <div class="card">
    <h2>Your Balance</h2>
    <p>$0.00</p>
  </div>

</div>

</body>
</html>
